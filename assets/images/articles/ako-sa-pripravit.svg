<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 628" role="img" aria-labelledby="svg-title svg-desc">
  <title id="svg-title">Ako sa pripraviť na pohovor — plán a čas</title>
  <desc id="svg-desc">Kalendár s postupne zaznačenými dňami, otvorená kniha, hodiny a stúpajúca krivka pokroku.</desc>

  <!-- Background -->
  <rect width="1200" height="628" fill="#FAF7EF"/>

  <!-- Subtle grid texture -->
  <g opacity="0.06">
    <path d="M0 80h1200M0 160h1200M0 240h1200M0 320h1200M0 400h1200M0 480h1200M0 560h1200" stroke="#0B4EA2" stroke-width="1"/>
  </g>

  <!-- Decorative shield top-left -->
  <g transform="translate(80, 70)">
    <path d="M0 0 L60 0 L60 45 Q60 72 30 85 Q0 72 0 45 Z" fill="#EE1C25" opacity="0.9"/>
    <path d="M0 0 L60 0 L60 18 L0 18 Z" fill="#0B4EA2" opacity="0.9"/>
    <rect x="0" y="18" width="60" height="18" fill="#FAF7EF"/>
    <path d="M12 52 L48 52 M20 62 L40 62 M26 72 L34 72" stroke="#FAF7EF" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- CALENDAR (center-left) -->
  <g transform="translate(180, 160)">
    <!-- Calendar back panel -->
    <rect x="0" y="0" width="340" height="340" rx="16" fill="#FFFFFF" stroke="#D4C9B0" stroke-width="1.5"/>

    <!-- Header strip -->
    <rect x="0" y="0" width="340" height="58" rx="16" fill="#0B4EA2"/>
    <rect x="0" y="30" width="340" height="28" fill="#0B4EA2"/>
    <text x="170" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#FFFFFF" letter-spacing="2">PLÁN PRÍPRAVY</text>

    <!-- Day headers -->
    <g transform="translate(20, 78)">
      <text x="22" y="12" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#6B7280">PO</text>
      <text x="66" y="12" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#6B7280">UT</text>
      <text x="110" y="12" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#6B7280">ST</text>
      <text x="154" y="12" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#6B7280">ŠT</text>
      <text x="198" y="12" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#6B7280">PI</text>
      <text x="242" y="12" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#EE1C25">SO</text>
      <text x="286" y="12" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#EE1C25">NE</text>
    </g>

    <!-- 4 weeks of day cells -->
    <g transform="translate(20, 95)">
      <!-- Week 1 — all checked -->
      <g transform="translate(0, 0)">
        <rect x="6" y="0" width="32" height="32" rx="6" fill="#DCE8F5"/>
        <path d="M16 16 L22 22 L32 10" stroke="#2E7D32" stroke-width="3" fill="none" stroke-linecap="round"/>
      </g>
      <g transform="translate(44, 0)">
        <rect x="6" y="0" width="32" height="32" rx="6" fill="#DCE8F5"/>
        <path d="M16 16 L22 22 L32 10" stroke="#2E7D32" stroke-width="3" fill="none" stroke-linecap="round"/>
      </g>
      <g transform="translate(88, 0)">
        <rect x="6" y="0" width="32" height="32" rx="6" fill="#DCE8F5"/>
        <path d="M16 16 L22 22 L32 10" stroke="#2E7D32" stroke-width="3" fill="none" stroke-linecap="round"/>
      </g>
      <g transform="translate(132, 0)">
        <rect x="6" y="0" width="32" height="32" rx="6" fill="#DCE8F5"/>
        <path d="M16 16 L22 22 L32 10" stroke="#2E7D32" stroke-width="3" fill="none" stroke-linecap="round"/>
      </g>
      <g transform="translate(176, 0)">
        <rect x="6" y="0" width="32" height="32" rx="6" fill="#DCE8F5"/>
        <path d="M16 16 L22 22 L32 10" stroke="#2E7D32" stroke-width="3" fill="none" stroke-linecap="round"/>
      </g>
      <g transform="translate(220, 0)">
        <rect x="6" y="0" width="32" height="32" rx="6" fill="#F5E8E8"/>
      </g>
      <g transform="translate(264, 0)">
        <rect x="6" y="0" width="32" height="32" rx="6" fill="#F5E8E8"/>
      </g>

      <!-- Week 2 — all checked -->
      <g transform="translate(0, 42)">
        <rect x="6" y="0" width="32" height="32" rx="6" fill="#DCE8F5"/>
        <path d="M16 16 L22 22 L32 10" stroke="#2E7D32" stroke-width="3" fill="none" stroke-linecap="round"/>
      </g>
      <g transform="translate(44, 42)">
        <rect x="6" y="0" width="32" height="32" rx="6" fill="#DCE8F5"/>
        <path d="M16 16 L22 22 L32 10" stroke="#2E7D32" stroke-width="3" fill="none" stroke-linecap="round"/>
      </g>
      <g transform="translate(88, 42)">
        <rect x="6" y="0" width="32" height="32" rx="6" fill="#DCE8F5"/>
        <path d="M16 16 L22 22 L32 10" stroke="#2E7D32" stroke-width="3" fill="none" stroke-linecap="round"/>
      </g>
      <g transform="translate(132, 42)">
        <rect x="6" y="0" width="32" height="32" rx="6" fill="#DCE8F5"/>
        <path d="M16 16 L22 22 L32 10" stroke="#2E7D32" stroke-width="3" fill="none" stroke-linecap="round"/>
      </g>
      <g transform="translate(176, 42)">
        <rect x="6" y="0" width="32" height="32" rx="6" fill="#DCE8F5"/>
        <path d="M16 16 L22 22 L32 10" stroke="#2E7D32" stroke-width="3" fill="none" stroke-linecap="round"/>
      </g>
      <g transform="translate(220, 42)">
        <rect x="6" y="0" width="32" height="32" rx="6" fill="#F5E8E8"/>
      </g>
      <g transform="translate(264, 42)">
        <rect x="6" y="0" width="32" height="32" rx="6" fill="#F5E8E8"/>
      </g>

      <!-- Week 3 — partial — today highlighted -->
      <g transform="translate(0, 84)">
        <rect x="6" y="0" width="32" height="32" rx="6" fill="#DCE8F5"/>
        <path d="M16 16 L22 22 L32 10" stroke="#2E7D32" stroke-width="3" fill="none" stroke-linecap="round"/>
      </g>
      <g transform="translate(44, 84)">
        <rect x="6" y="0" width="32" height="32" rx="6" fill="#DCE8F5"/>
        <path d="M16 16 L22 22 L32 10" stroke="#2E7D32" stroke-width="3" fill="none" stroke-linecap="round"/>
      </g>
      <!-- Today cell -->
      <g transform="translate(88, 84)">
        <rect x="6" y="0" width="32" height="32" rx="6" fill="#EE1C25"/>
        <text x="22" y="22" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">15</text>
      </g>
      <g transform="translate(132, 84)">
        <rect x="6" y="0" width="32" height="32" rx="6" fill="#F2F2F2"/>
      </g>
      <g transform="translate(176, 84)">
        <rect x="6" y="0" width="32" height="32" rx="6" fill="#F2F2F2"/>
      </g>
      <g transform="translate(220, 84)">
        <rect x="6" y="0" width="32" height="32" rx="6" fill="#F5E8E8"/>
      </g>
      <g transform="translate(264, 84)">
        <rect x="6" y="0" width="32" height="32" rx="6" fill="#F5E8E8"/>
      </g>

      <!-- Week 4 — upcoming -->
      <g transform="translate(0, 126)">
        <rect x="6" y="0" width="32" height="32" rx="6" fill="#F2F2F2"/>
      </g>
      <g transform="translate(44, 126)">
        <rect x="6" y="0" width="32" height="32" rx="6" fill="#F2F2F2"/>
      </g>
      <g transform="translate(88, 126)">
        <rect x="6" y="0" width="32" height="32" rx="6" fill="#F2F2F2"/>
      </g>
      <g transform="translate(132, 126)">
        <rect x="6" y="0" width="32" height="32" rx="6" fill="#F2F2F2"/>
      </g>
      <!-- Exam day highlighted -->
