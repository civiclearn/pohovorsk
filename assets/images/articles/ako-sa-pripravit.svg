    <path d="M140 -8 L280 0 L280 158 L140 150 Z" fill="#FFFFFF" stroke="#D4C9B0" stroke-width="1.5"/>
    <!-- Spine -->
    <path d="M140 -8 L140 150" stroke="#D4C9B0" stroke-width="1.5"/>

    <!-- Left page text lines -->
    <g transform="translate(16, 20)">
      <rect x="0" y="0" width="60" height="9" rx="1" fill="#0B4EA2"/>
      <rect x="0" y="20" width="110" height="4" rx="1" fill="#C8BCA8"/>
      <rect x="0" y="30" width="106" height="4" rx="1" fill="#C8BCA8"/>
      <rect x="0" y="40" width="100" height="4" rx="1" fill="#C8BCA8"/>
      <rect x="0" y="55" width="110" height="4" rx="1" fill="#C8BCA8"/>
      <rect x="0" y="65" width="108" height="4" rx="1" fill="#C8BCA8"/>
      <rect x="0" y="75" width="90" height="4" rx="1" fill="#C8BCA8"/>
      <rect x="0" y="95" width="60" height="7" rx="1" fill="#EE1C25"/>
      <rect x="0" y="112" width="106" height="4" rx="1" fill="#C8BCA8"/>
      <rect x="0" y="122" width="108" height="4" rx="1" fill="#C8BCA8"/>
    </g>

    <!-- Right page text lines -->
