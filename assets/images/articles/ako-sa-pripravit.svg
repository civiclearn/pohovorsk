        <rect x="6" y="0" width="32" height="32" rx="6" fill="#D4A847" stroke="#B8902A" stroke-width="2"/>
        <text x="22" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#FFFFFF">🎓</text>
      </g>
      <g transform="translate(220, 126)">
        <rect x="6" y="0" width="32" height="32" rx="6" fill="#F5E8E8"/>
      </g>
      <g transform="translate(264, 126)">
        <rect x="6" y="0" width="32" height="32" rx="6" fill="#F5E8E8"/>
      </g>
    </g>
  </g>

  <!-- OPEN BOOK (right-upper) -->
