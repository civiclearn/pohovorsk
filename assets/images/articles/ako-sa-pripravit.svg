      <rect x="0" y="0" width="75" height="9" rx="1" fill="#0B4EA2"/>
      <rect x="0" y="20" width="105" height="4" rx="1" fill="#C8BCA8"/>
      <rect x="0" y="30" width="110" height="4" rx="1" fill="#C8BCA8"/>
      <rect x="0" y="40" width="95" height="4" rx="1" fill="#C8BCA8"/>
      <rect x="0" y="55" width="108" height="4" rx="1" fill="#C8BCA8"/>
      <rect x="0" y="65" width="102" height="4" rx="1" fill="#C8BCA8"/>
      <rect x="0" y="80" width="100" height="4" rx="1" fill="#C8BCA8"/>
      <rect x="0" y="95" width="106" height="4" rx="1" fill="#C8BCA8"/>
      <rect x="0" y="112" width="92" height="4" rx="1" fill="#C8BCA8"/>
    </g>
  </g>

  <!-- CLOCK (right-lower) -->
  <g transform="translate(820, 420)">
    <circle cx="0" cy="0" r="72" fill="#FFFFFF" stroke="#0B4EA2" stroke-width="5"/>
    <circle cx="0" cy="0" r="72" fill="none" stroke="#D4A847" stroke-width="5" stroke-dasharray="339" stroke-dashoffset="85" transform="rotate(-90)"/>
    <!-- Hour ticks -->
    <g stroke="#6B7280" stroke-width="2">
      <line x1="0" y1="-62" x2="0" y2="-54"/>
      <line x1="62" y1="0" x2="54" y2="0"/>
      <line x1="0" y1="62" x2="0" y2="54"/>
      <line x1="-62" y1="0" x2="-54" y2="0"/>
    </g>
    <!-- Hands -->
    <line x1="0" y1="0" x2="0" y2="-38" stroke="#083063" stroke-width="4" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="30" y2="18" stroke="#EE1C25" stroke-width="3" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="5" fill="#083063"/>
  </g>

  <!-- Rising progress arrow (bottom-center) -->
  <g transform="translate(560, 510)">
    <path d="M0 30 Q30 25 60 18 T120 5 T180 -10" stroke="#2E7D32" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M170 -14 L184 -10 L180 4" stroke="#2E7D32" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="0" cy="30" r="5" fill="#2E7D32"/>
    <circle cx="60" cy="18" r="4" fill="#2E7D32"/>
    <circle cx="120" cy="5" r="4" fill="#2E7D32"/>
  </g>

  <!-- Legal anchor -->
  <g transform="translate(1080, 580)" opacity="0.45">
    <text x="0" y="0" text-anchor="end" font-family="Georgia, serif" font-size="14" font-style="italic" fill="#6B7280">§ 8 ods. 6 • zákon 40/1993 Z. z.</text>
  </g>

  <!-- Kicker label top-right -->
  <g transform="translate(1120, 95)">
    <text x="0" y="0" text-anchor="end" font-family="Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="2" fill="#0B4EA2">POHOVOR · SR</text>
