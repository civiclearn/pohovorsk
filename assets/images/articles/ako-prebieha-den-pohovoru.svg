<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 628" role="img" aria-labelledby="svg-title svg-desc">
  <title id="svg-title">Deň pohovoru — obvodný úrad</title>
  <desc id="svg-desc">Zjednodušená budova obvodného úradu so slovenskou vlajkou, hodinami a postavou žiadateľa s dokumentami prichádzajúcou na pohovor.</desc>

  <!-- Background gradient sky -->
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FAF7EF"/>
      <stop offset="100%" stop-color="#F0EBDE"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="628" fill="url(#sky)"/>

  <!-- Subtle grid texture -->
  <g opacity="0.06">
    <path d="M0 80h1200M0 160h1200M0 240h1200M0 320h1200M0 400h1200M0 480h1200M0 560h1200" stroke="#0B4EA2" stroke-width="1"/>
  </g>

  <!-- Ground line -->
  <rect x="0" y="520" width="1200" height="108" fill="#E8DFC9"/>
  <line x1="0" y1="520" x2="1200" y2="520" stroke="#C9B98E" stroke-width="1.5"/>

  <!-- Decorative shield top-left -->
  <g transform="translate(80, 70)">
    <path d="M0 0 L60 0 L60 45 Q60 72 30 85 Q0 72 0 45 Z" fill="#EE1C25" opacity="0.9"/>
    <path d="M0 0 L60 0 L60 18 L0 18 Z" fill="#0B4EA2" opacity="0.9"/>
    <rect x="0" y="18" width="60" height="18" fill="#FAF7EF"/>
    <path d="M12 52 L48 52 M20 62 L40 62 M26 72 L34 72" stroke="#FAF7EF" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- GOVERNMENT BUILDING (center) -->
  <g transform="translate(540, 180)">
    <!-- Flagpole -->
    <line x1="200" y1="-40" x2="200" y2="30" stroke="#6B7280" stroke-width="3"/>
    <!-- Slovak flag -->
    <g transform="translate(200, -40)">
      <rect x="0" y="0" width="70" height="14" fill="#FFFFFF"/>
      <rect x="0" y="14" width="70" height="14" fill="#0B4EA2"/>
      <rect x="0" y="28" width="70" height="14" fill="#EE1C25"/>
      <!-- Coat of arms on flag -->
      <g transform="translate(16, 14) scale(0.28)">
        <path d="M0 0 L50 0 L50 35 Q50 58 25 68 Q0 58 0 35 Z" fill="#EE1C25"/>
        <path d="M0 0 L50 0 L50 14 L0 14 Z" fill="#0B4EA2"/>
        <rect x="0" y="14" width="50" height="14" fill="#FAF7EF"/>
      </g>
    </g>

    <!-- Roof pediment -->
    <path d="M20 30 L200 -20 L380 30 Z" fill="#083063"/>
    <path d="M30 30 L200 -10 L370 30 Z" fill="#0B4EA2"/>

    <!-- Classical frieze -->
    <rect x="20" y="30" width="360" height="14" fill="#D4C9B0"/>

    <!-- Columns area -->
    <rect x="20" y="44" width="360" height="290" fill="#E8DFC9"/>

    <!-- 6 columns -->
    <g fill="#FAF7EF" stroke="#C9B98E" stroke-width="1.5">
      <rect x="40" y="70" width="30" height="240"/>
      <rect x="100" y="70" width="30" height="240"/>
      <rect x="160" y="70" width="30" height="240"/>
      <rect x="210" y="70" width="30" height="240"/>
      <rect x="270" y="70" width="30" height="240"/>
      <rect x="330" y="70" width="30" height="240"/>
    </g>
    <!-- Column capitals -->
    <g fill="#D4C9B0">
      <rect x="36" y="62" width="38" height="10"/>
      <rect x="96" y="62" width="38" height="10"/>
      <rect x="156" y="62" width="38" height="10"/>
      <rect x="206" y="62" width="38" height="10"/>
      <rect x="266" y="62" width="38" height="10"/>
      <rect x="326" y="62" width="38" height="10"/>
    </g>
    <!-- Column bases -->
    <g fill="#D4C9B0">
      <rect x="36" y="308" width="38" height="10"/>
      <rect x="96" y="308" width="38" height="10"/>
      <rect x="156" y="308" width="38" height="10"/>
      <rect x="206" y="308" width="38" height="10"/>
      <rect x="266" y="308" width="38" height="10"/>
      <rect x="326" y="308" width="38" height="10"/>
    </g>

    <!-- Steps -->
    <rect x="0" y="318" width="400" height="8" fill="#C9B98E"/>
    <rect x="-10" y="326" width="420" height="8" fill="#B8A67A"/>
    <rect x="-20" y="334" width="440" height="6" fill="#A89567"/>

    <!-- Entrance door (darker gap between columns 3 and 4) -->
    <rect x="190" y="240" width="20" height="80" fill="#2D1810" opacity="0.6"/>

    <!-- Building label plaque -->
    <rect x="140" y="160" width="120" height="30" fill="#083063" rx="3"/>
    <text x="200" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF" letter-spacing="2">OBVODNÝ ÚRAD</text>
  </g>

  <!-- APPROACHING FIGURE (bottom-left of building) -->
  <g transform="translate(380, 420)">
    <!-- Shadow -->
    <ellipse cx="0" cy="102" rx="40" ry="8" fill="#0B4EA2" opacity="0.2"/>
    <!-- Body -->
    <rect x="-25" y="20" width="50" height="80" rx="8" fill="#EE1C25"/>
    <!-- Head -->
    <circle cx="0" cy="5" r="22" fill="#E8C4A0"/>
    <path d="M-17 -2 Q-17 -15 0 -15 Q17 -15 17 -2 L17 8 L-17 8 Z" fill="#3A2817"/>
    <!-- Briefcase / folder in hand -->
    <g transform="translate(22, 48)">
      <rect x="0" y="0" width="36" height="26" rx="2" fill="#D4A847" stroke="#8B7355" stroke-width="1.5"/>
      <line x1="0" y1="8" x2="36" y2="8" stroke="#8B7355" stroke-width="1"/>
      <rect x="14" y="-4" width="8" height="4" fill="#8B7355"/>
    </g>
    <!-- Footsteps trail behind -->
    <g opacity="0.35">
      <ellipse cx="-50" cy="106" rx="7" ry="3" fill="#6B7280"/>
      <ellipse cx="-75" cy="110" rx="6" ry="3" fill="#6B7280"/>
      <ellipse cx="-100" cy="108" rx="5" ry="2.5" fill="#6B7280"/>
      <ellipse cx="-120" cy="112" rx="4" ry="2" fill="#6B7280"/>
    </g>
  </g>

  <!-- CLOCK (top-right, indicating time of appointment) -->
  <g transform="translate(1010, 280)">
    <!-- Clock body -->
    <circle cx="0" cy="0" r="72" fill="#FFFFFF" stroke="#0B4EA2" stroke-width="5"/>
    <!-- Hour marks -->
    <g stroke="#083063" stroke-width="2.5">
      <line x1="0" y1="-62" x2="0" y2="-54"/>
      <line x1="62" y1="0" x2="54" y2="0"/>
      <line x1="0" y1="62" x2="0" y2="54"/>
      <line x1="-62" y1="0" x2="-54" y2="0"/>
    </g>
    <g stroke="#6B7280" stroke-width="1.5">
      <line x1="31" y1="-54" x2="27" y2="-47"/>
      <line x1="54" y1="-31" x2="47" y2="-27"/>
      <line x1="54" y1="31" x2="47" y2="27"/>
      <line x1="31" y1="54" x2="27" y2="47"/>
      <line x1="-31" y1="54" x2="-27" y2="47"/>
      <line x1="-54" y1="31" x2="-47" y2="27"/>
      <line x1="-54" y1="-31" x2="-47" y2="-27"/>
      <line x1="-31" y1="-54" x2="-27" y2="-47"/>
    </g>
    <!-- Hands pointing to 9:00 -->
    <line x1="0" y1="0" x2="-34" y2="0" stroke="#083063" stroke-width="4" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="0" y2="-45" stroke="#EE1C25" stroke-width="3" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="5" fill="#083063"/>
    <!-- Time label -->
    <text x="0" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#083063">09:00</text>
  </g>

  <!-- DOCUMENT stack bottom-right -->
  <g transform="translate(1000, 450)">
    <!-- Back paper -->
    <rect x="6" y="6" width="80" height="100" rx="3" fill="#D4C9B0"/>
    <!-- Front document -->
    <rect x="0" y="0" width="80" height="100" rx="3" fill="#FFFFFF" stroke="#C9B98E" stroke-width="1.5"/>
    <!-- Header -->
    <rect x="8" y="10" width="40" height="6" rx="1" fill="#0B4EA2"/>
    <rect x="8" y="22" width="64" height="3" rx="1" fill="#C8BCA8"/>
    <rect x="8" y="30" width="58" height="3" rx="1" fill="#C8BCA8"/>
    <rect x="8" y="38" width="62" height="3" rx="1" fill="#C8BCA8"/>
    <rect x="8" y="46" width="50" height="3" rx="1" fill="#C8BCA8"/>
    <!-- Stamp -->
    <circle cx="56" cy="74" r="14" fill="none" stroke="#EE1C25" stroke-width="2"/>
    <text x="56" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#EE1C25">SK</text>
  </g>

  <!-- Legal anchor -->
  <g transform="translate(1080, 600)" opacity="0.45">
    <text x="0" y="0" text-anchor="end" font-family="Georgia, serif" font-size="14" font-style="italic" fill="#6B7280">§ 8 ods. 6 • zákon 40/1993 Z. z.</text>
  </g>

  <!-- Kicker label top-right -->
  <g transform="translate(1120, 95)">
    <text x="0" y="0" text-anchor="end" font-family="Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="2" fill="#0B4EA2">POHOVOR · SR</text>
  </g>
</svg>
